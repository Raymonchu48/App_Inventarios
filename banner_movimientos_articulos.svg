<svg width="100%" viewBox="0 0 680 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMov" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#120a1a;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#1e1028;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#120a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineMov" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#120a1a;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#a87ed4;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#a87ed4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#120a1a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="680" height="140" fill="url(#bgMov)" rx="10" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

