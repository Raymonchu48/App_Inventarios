<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 1600 96"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgMov" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#120a1a"/>
      <stop offset="45%" stop-color="#1e1028"/>
      <stop offset="100%" stop-color="#120a1a"/>
    </linearGradient>
    <linearGradient id="lineMov" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#120a1a"/>
      <stop offset="20%" stop-color="#a87ed4"/>
      <stop offset="80%" stop-color="#a87ed4"/>
      <stop offset="100%" stop-color="#120a1a"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="96" rx="20" fill="url(#bgMov)"/>

  <rect x="92" y="16" width="1416" height="1.2" rx="1" fill="url(#lineMov)" opacity="0.95"/>
  <rect x="92" y="80" width="1416" height="1.2" rx="1" fill="url(#lineMov)" opacity="0.95"/>

  <polygon points="800,11 806,21 794,21" fill="#a87ed4" opacity="0.85"/>
  <polygon points="800,85 806,75 794,75" fill="#a87ed4" opacity="0.85"/>

  <!-- Icono izquierda -->
  <g opacity="0.42" transform="translate(168,30)">
    <rect x="-24" y="10" width="48" height="34" rx="4" fill="none" stroke="#a87ed4" stroke-width="1.4"/>
    <line x1="-36" y1="-2" x2="-24" y2="10" stroke="#a87ed4" stroke-width="1.8"/>
    <polygon points="-24,10 -34,4 -28,16" fill="#a87ed4" opacity="0.95"/>
    <line x1="24" y1="10" x2="36" y2="-2" stroke="#a87ed4" stroke-width="1.8"/>
    <polygon points="36,-2 26,4 32,-8" fill="#a87ed4" opacity="0.95"/>
    <line x1="-8" y1="26" x2="8" y2="26" stroke="#a87ed4" stroke-width="1.2" opacity="0.75"/>
  </g>

  <!-- Icono derecha -->
  <g opacity="0.40" transform="translate(1432,26)">
    <rect x="-26" y="2" width="52" height="48" rx="4" fill="none" stroke="#a87ed4" stroke-width="1.4"/>
    <line x1="-14" y1="14" x2="14" y2="14" stroke="#a87ed4" stroke-width="1"/>
    <line x1="-14" y1="24" x2="14" y2="24" stroke="#a87ed4" stroke-width="1"/>
    <line x1="-14" y1="34" x2="8" y2="34" stroke="#a87ed4" stroke-width="1"/>
    <polyline points="11,27 19,32 11,37" fill="none" stroke="#a87ed4" stroke-width="1.4"/>
  </g>

  <circle cx="118" cy="48" r="4" fill="#a87ed4" opacity="0.22"/>
  <circle cx="1482" cy="48" r="4" fill="#a87ed4" opacity="0.22"/>
  <circle cx="132" cy="48" r="2" fill="#a87ed4" opacity="0.14"/>
  <circle cx="1468" cy="48" r="2" fill="#a87ed4" opacity="0.14"/>

  <text x="800" y="34"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12"
        font-weight="400"
        letter-spacing="5"
        fill="#a87ed4"
        opacity="0.74">✦ TRAZABILIDAD ✦</text>

  <text x="800" y="58"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        font-weight="700"
        letter-spacing="1.2"
        fill="#ddc8f5"
        filter="url(#softGlow)">Movimientos de Artículos</text>

  <text x="800" y="73"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="10.5"
        font-weight="400"
        letter-spacing="4"
        fill="#a87ed4"
        opacity="0.88">Entradas · Salidas · Devoluciones · Historial</text>
</svg>
