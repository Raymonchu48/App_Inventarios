<svg width="100%" viewBox="0 0 680 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgAdm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0f18;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#0e1520;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f18;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineAdm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0f18;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#5a9fd4;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#5a9fd4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f18;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="680" height="140" fill="url(#bgAdm)" rx="10" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <rect x="40" y="28" width="600" height="0.8" fill="url(#lineAdm)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="40" y="112" width="600" height="0.8" fill="url(#lineAdm)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <polygon points="340,22 344,30 336,30" fill="#5a9fd4" opacity="0.8" style="fill:rgb(90, 159, 212);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polygon points="340,118 344,110 336,110" fill="#5a9fd4" opacity="0.8" style="fill:rgb(90, 159, 212);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Escudo / shield izquierda -->
