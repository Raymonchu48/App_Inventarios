    <path d="M0,-22 L18,-12 L18,8 Q18,24 0,30 Q-18,24 -18,8 L-18,-12 Z" fill="none" stroke="#5a9fd4" stroke-width="1.1" style="fill:none;stroke:rgb(90, 159, 212);color:rgb(0, 0, 0);stroke-width:1.1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
