    <line x1="-14" y1="6" x2="-6" y2="6" stroke="#5a9fd4" stroke-width="0.7" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(90, 159, 212);color:rgb(0, 0, 0);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
